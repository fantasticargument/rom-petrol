<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Обрані товари</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

<header>
  <div class="header-inner">
    <h1 class="site-title">Обрані товари</h1>
  </div>
</header>

<div class="layout">
  <main class="content-area">
    <div class="cards" id="favCards"></div>
  </main>
</div>

<script>
  function safeGetFavorites() {
    try {
      const raw = localStorage.getItem("favorites");
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
      console.error("Помилка парсу favorites:", e);
      return [];
    }
  }

  function renderFavs() {
    const favCards = document.getElementById("favCards");
    if (!favCards) {
      console.error("Не знайдено #favCards");
      return;
    }

    const favs = safeGetFavorites();
    console.log("Обрані з localStorage:", favs);

    favCards.innerHTML = "";

    if (!favs.length) {
      favCards.innerHTML = `
        <div class="empty-favs">
          Немає обраних товарів. Поверніться на головну і додайте щось в обране.
        </div>
      `;
      favCards.classList.add("loaded");   /* ← ДОДАНО */
      return;
    }

    favs.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      const imgSrc = item.image || "images/placeholder.png";

      card.innerHTML = `
        <img src="${imgSrc}" alt="${item.name || ''}">
        <div class="card-body">
          <p class="category">${item.category || ''}</p>
          <h3>${item.name || ''}</h3>
          <p class="availability ${item.available ? 'yes' : 'no'}">
            ${item.available ? 'Є в наявності' : 'Немає'}
          </p>
        </div>
      `;

      favCards.appendChild(card);
    });

    favCards.classList.add("loaded");   /* ← ГОЛОВНЕ ВИПРАВЛЕННЯ */
  }

  document.addEventListener("DOMContentLoaded", renderFavs);
</script>

</body>
</html>
