<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Обрані товари</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="icon" href="favicon.svg">
</head>
<body>

<header>
  <div class="header-bg"></div>

  <div class="header-inner">

    <div class="header-top">
      <div class="burger">
        <span></span><span></span><span></span>
      </div>

      <h1 class="site-title">ROM-PETROL</h1>

      <div class="header-icons">
        <a href="favorites.html" class="fav-link">
          <svg class="fav-icon" viewBox="0 0 24 24" fill="none"
               stroke="white" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 12.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
        </a>
      </div>
    </div>

    <!-- Замість пошуку -->
    <h2 class="favorites-title">Обране</h2>

  </div>
</header>


<div class="layout">
  <main class="content-area">
    <div class="cards" id="favoritesCards"></div>
  </main>
</div>

<script>
function loadFavorites() {
  const favs = JSON.parse(localStorage.getItem("favorites")) || [];
  const container = document.getElementById("favoritesCards");

  if (favs.length === 0) {
    container.innerHTML = "<p style='text-align:center;color:#555;'>Немає обраних товарів</p>";
    return;
  }

  container.innerHTML = favs.map(item => `
    <div class="card" onclick='openModal(${JSON.stringify(item)})'>
      <img src="${item.image || "images/placeholder.png"}">
      <div class="card-body">
        <p class="category">${item.category}</p>
        <h3>${item.name}</h3>
        <p class="availability ${item.available ? "yes" : "no"}">
          ${item.available ? "Є в наявності" : "Немає"}
        </p>
      </div>
    </div>
  `).join("");
}

document.addEventListener("DOMContentLoaded", loadFavorites);
</script>


</body>
</html>
