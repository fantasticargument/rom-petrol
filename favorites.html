<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Обране — ROM-PETROL</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="icon" href="favicon.svg">
</head>

<body>

<header>
  <div class="header-bg"></div>

  <div class="header-inner">

    <div class="header-top">
      <div class="burger">
        <span></span><span></span><span></span>
      </div>

      <h1 class="site-title">ROM-PETROL</h1>

      <div class="header-icons">
        <a href="favorites.html" class="fav-link">
          <svg class="fav-icon" viewBox="0 0 24 24" fill="none"
               stroke="white" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 12.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
        </a>
      </div>
    </div>

    <!-- Замість пошуку -->
    <h2 class="favorites-title">Обране</h2>

  </div>
</header>


<!-- Контейнер карток -->
<div class="cards" id="favCards"></div>


<!-- Модалка (та сама, що на головній) -->
<div class="overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="close" onclick="closeModal()">×</button>

    <img id="modalImg" class="modal-img" src="" alt="">

    <div class="modal-header">
      <h2 id="modalTitle" class="modal-title"></h2>
    </div>

    <div class="modal-row">
      <p id="modalCategory" class="modal-category"></p>
      <p id="modalAvailability" class="modal-availability"></p>
    </div>

    <div class="modal-row">
      <p id="modalCode" class="modal-code"></p>
    </div>

    <button id="addFavBtn" class="add-fav-btn">
      <svg class="fav-icon-small" viewBox="0 0 24 24" fill="none"
           stroke="white" stroke-width="2" stroke-linecap="round"
           stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5"></path>
      </svg>
      Додати в обране
    </button>

    <p id="modalDescription" class="modal-description"></p>
  </div>
</div>


<!-- Підключаємо main.js (модалка, логіка обраного, бургер) -->
<script src="scripts/main.js"></script>


<!-- Скрипт рендера обраного -->
<script>
  function safeGetFavorites() {
    try {
      const raw = localStorage.getItem("favorites");
      if (!raw) return [];
      const parsed = JSON.parse(raw);
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) {
      console.error("Помилка парсу favorites:", e);
      return [];
    }
  }

  function renderFavs() {
    const favCards = document.getElementById("favCards");
    if (!favCards) {
      console.error("Не знайдено #favCards");
      return;
    }

    const favs = safeGetFavorites();
    favCards.innerHTML = "";

    if (!favs.length) {
      favCards.innerHTML = `
        <div class="empty-favs">
          Немає обраних товарів. Поверніться на головну і додайте щось в обране.
        </div>
      `;
      favCards.classList.add("loaded");
      return;
    }

    favs.forEach(item => {
      const card = document.createElement("div");
      card.className = "card";

      const imgSrc = item.image || "images/placeholder.png";

      card.innerHTML = `
        <img src="${imgSrc}" alt="${item.name || ''}">
        <div class="card-body">
          <p class="category">${item.category || ''}</p>
          <h3>${item.name || ''}</h3>
          <p class="availability ${item.available ? 'yes' : 'no'}">
            ${item.available ? 'Є в наявності' : 'Немає'}
          </p>
        </div>
      `;

      card.addEventListener("click", () => openModal(item));

      favCards.appendChild(card);
    });

    favCards.classList.add("loaded");
  }

  document.addEventListener("DOMContentLoaded", renderFavs);
</script>

</body>
</html>
