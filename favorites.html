<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Обране — ROM-PETROL</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="icon" href="favicon.svg">
</head>

<body class="favorites-page">

<header>
  <div class="header-bg"></div>

  <div class="header-inner">
    <h1 class="site-title">ROM-PETROL</h1>
    <h2 class="favorites-title">Обране</h2>
  </div>
</header>

<div class="menu-overlay">
  <div class="menu-content">
    <ul id="mobileCategoryList"></ul>
  </div>
</div>

<div class="layout">
  <aside class="sidebar desktop-only">
    <h3>Категорії</h3>
    <ul id="categoryList"></ul>
  </aside>

  <main class="content-area">
    <div class="cards" id="favCards"></div>
  </main>
</div>

<div class="overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <div class="modal-inner">
      <button class="close" onclick="closeModal()">×</button>

      <img id="modalImage" class="modal-img" src="" alt="">
      <div class="modal-header">
        <h2 id="modalTitle" class="modal-title"></h2>
      </div>

      <div class="modal-row">
        <p id="modalCategory" class="modal-category"></p>
        <p id="modalAvailability" class="modal-availability"></p>
      </div>

      <div class="modal-row">
        <p id="modalCode" class="modal-code"></p>
        <button id="addFavBtn" class="add-fav-btn">
          <svg class="fav-icon-small" viewBox="0 0 24 24" fill="none"
               stroke="white" stroke-width="2" stroke-linecap="round"
               stroke-linejoin="round">
            <path d="M20 6L9 17l-5-5"></path>
          </svg>
          Видалити з обраного
        </button>
      </div>

      <p id="modalDescription" class="modal-description"></p>
    </div>
  </div>
</div>

<script>
  const IS_FAVORITES_PAGE = true;
</script>

<script src="scripts/main.js"></script>

<script>
  function renderFavs() {
    const favCards = document.getElementById("favCards");
    if (!favCards) return;

    const favs = safeGetFavorites();

    if (!favs.length) {
      favCards.innerHTML = `
        <div class="empty-favs">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="6" y="3" width="12" height="18" rx="2" ry="2"></rect>
              <path d="M14 3l2 2h-4"></path>
              <path d="M9 11h6"></path>
              <path d="M9 15h3"></path>
            </svg>
          </div>

          <h3>У вас ще немає обраного</h3>
          <p>Перегляньте каталог і додайте потрібні Вам позиції.</p>

          <a href="index.html" class="empty-btn">На головну</a>
        </div>
      `;

      buildCategoryList();
      buildMobileMenuCategories();
      return;
    }

    loadCards(favs);
    buildCategoryList();
    buildMobileMenuCategories();
  }

  window.addEventListener("load", renderFavs);
</script>


<button id="scrollTopBtn">▲</button>

<footer class="site-footer">
  СЛАВА УКРАЇНІ | 2026 ©
</footer>

</body>
</html>
