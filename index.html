<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROM-PETROL</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="icon" href="favicon.svg">
</head>
<body>

<!-- ===========================
     HEADER (Mobile First)
     =========================== -->
<header>
  <div class="header-bg"></div>

  <div class="header-inner">

    <div class="header-top">
      <h1 class="site-title">ROM-PETROL</h1>

      <div class="header-icons">
        <a href="favorites.html" class="fav-link">
         <svg class="fav-icon" viewBox="0 0 24 24" fill="none"
              stroke="white" stroke-width="2" stroke-linecap="round"
              stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 12.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
        </a>

        <div class="burger">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div class="search-wrapper">
      <input type="text" id="searchInput" placeholder="Пошук...">
      <span id="clearSearch" class="clear-btn">×</span>
    </div>

  </div>
</header>

<!-- ===========================
     ПОВНОЕКРАННЕ МЕНЮ
     =========================== -->
<div class="menu-overlay">

  <div class="menu-content">
    <ul id="mobileCategoryList"></ul>
  </div>
</div>   

<!-- ===========================
     ОСНОВНА СІТКА
     =========================== -->
<div class="layout">

  <!-- САЙДБАР (десктоп) -->
  <aside class="sidebar desktop-only">
    <h3>Категорії</h3>
    <ul id="categoryList"></ul>
  </aside>

  <!-- КОНТЕНТ -->
  <main class="content-area">
      <div class="cards"></div>
  </main>

</div>

<!-- ===========================
     МОДАЛЬНЕ ВІКНО
     =========================== -->
<div class="overlay">
  <div class="modal" id="modal">

    <div class="modal-inner">

      <button class="close">×</button>

      <img class="modal-img" id="modalImage">
      <div class="modal-gallery" id="modalGallery"></div>

      <div class="modal-header">

        <h2 class="modal-title"></h2>

        <div class="modal-row">
          <p class="modal-category"></p>
          <p class="modal-availability"></p>
        </div>

        <div class="modal-row">
          <p class="modal-code"></p>

          <button class="add-fav-btn" id="addFavBtn">
            <svg class="fav-icon-small" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round">
              <circle cx="9" cy="21" r="1"></circle>
              <circle cx="20" cy="21" r="1"></circle>
              <path d="M1 1h4l2.68 12.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
            </svg>
            Додати в обране
          </button>
        </div>

      </div>

      <div class="modal-content">
        <p id="modalDescription" class="modal-description"></p>
      </div>

    </div> <!-- /modal-inner -->

  </div>
</div>

<!-- КНОПКА ВГОРУ -->
<button id="scrollTopBtn">▲</button>

<footer class="site-footer">
  СЛАВА УКРАЇНІ | 2026 ©
</footer>

<script src="scripts/main.js"></script>

</body>
</html>
