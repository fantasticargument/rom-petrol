<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROM-PETROL</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="icon" href="favicon.svg">
</head>
<body>

<!-- ===========================
     HEADER (Mobile First)
     =========================== -->
<header>
  <div class="header-bg"></div>

  <div class="header-inner">
    <div class="header-top">
      <h1 class="site-title">ROM-PETROL</h1>
      <div class="burger">
        <span></span><span></span><span></span>
      </div>
    </div>

    <div class="search-wrapper">
      <input type="text" id="searchInput" placeholder="Пошук...">
      <span id="clearSearch" class="clear-btn">×</span>
    </div>
  </div>
</header>


<!-- ===========================
     ПОВНОЕКРАННЕ МЕНЮ
     =========================== -->
<div class="menu-overlay">

  <div class="menu-content">
    <ul id="mobileCategoryList"></ul>
  </div>
</div>   

<!-- ===========================
     ОСНОВНА СІТКА
     =========================== -->
<div class="layout">

  <!-- САЙДБАР (десктоп) -->
  <aside class="sidebar desktop-only">
    <h3>Категорії</h3>
    <ul id="categoryList"></ul>
  </aside>

  <!-- КОНТЕНТ -->
  <main class="content-area">
      <div class="cards"></div>
  </main>

</div>

<!-- ===========================
     МОДАЛЬНЕ ВІКНО
     =========================== -->
<div class="overlay">
  <div class="modal">
    <button class="close">×</button>

    <img class="modal-img" id="modalImage">
    <div class="modal-gallery" id="modalGallery"></div>

    <div class="modal-header">
      <h2 class="modal-title"></h2>
      <p class="modal-category"></p>
      <p class="modal-availability"></p>
      <p class="modal-code"></p>
    </div>

    <div class="modal-content">
      <p id="modalDescription" class="modal-description"></p>
    </div>
  </div>
</div>

<!-- КНОПКА ВГОРУ -->
<button id="scrollTopBtn">▲</button>

<footer class="site-footer">
  СЛАВА УКРАЇНІ | 2026 ©
</footer>

<script src="scripts/main.js"></script>

</body>
</html>
