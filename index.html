<!DOCTYPE html>
<html lang="uk">
<head>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ROM-PETROL</title>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>

<header>
  <div class="header-content">

    <h1 class="site-title">ROM-PETROL</h1>

    <div class="search-wrapper">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Пошук...">
        <span id="clearSearch" class="clear-btn">×</span>
      </div>
    </div>

    <div class="right-space"></div>

  </div>
</header>

<main>
  <div class="container">
    <div class="cards"></div>
  </div>
</main>

<div class="overlay hidden">
  <div class="modal">
    <button class="close">×</button>

    <img class="modal-img" id="modalImage">

    <div class="modal-gallery" id="modalGallery"></div>

    <div class="modal-header">
      <h2 class="modal-title"></h2>
      <p class="modal-category"></p>
      <p class="modal-availability"></p>
      <p class="modal-code"></p>
    </div>

    <div class="modal-content">
      <p id="modalDescription" class="modal-description"></p>
    </div>

  </div>
</div>

<button id="scrollTopBtn">▲</button>

<script src="scripts/main.js"></script>

<footer class="site-footer">
  СЛАВА УКРАЇНІ | 2026 ©
</footer>

</body>
</html>
